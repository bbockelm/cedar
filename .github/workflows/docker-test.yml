name: Docker Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  docker-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Build test image
      run: docker build -t golang-cedar-test .

    - name: Run unit tests
      run: docker run --rm golang-cedar-test go test -v -short ./...

    - name: Run all tests
      run: docker run --rm golang-cedar-test go test -v ./...

  docker-compose-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@4eb059ff7f16592f9c84d5ca339c53cb7c5064e2 # v2.3.0

    - name: Run tests via docker compose
      run: docker compose up --abort-on-container-exit test

    - name: Run coverage
      run: docker compose up --abort-on-container-exit test-coverage
