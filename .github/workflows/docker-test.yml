name: Docker Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  docker-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

    - name: Build test image
      run: docker build -t golang-cedar-test .

    - name: Run unit tests
      run: docker run --rm golang-cedar-test go test -v -short ./...

    - name: Run all tests
      run: docker run --rm golang-cedar-test go test -v ./...

  docker-compose-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@2fe291b7677a45ee1269ec56a42604c143505e7e # v1.3.0

    - name: Run tests via docker compose
      run: docker compose up --abort-on-container-exit test

    - name: Run coverage
      run: docker compose up --abort-on-container-exit test-coverage
